<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo — Elite PC Parts</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/catalogo.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <header class="header">
    <div class="header__inner container">
      <a href="../../index.html" class="header__logo">
        <span class="logo-elite">ELITE</span><span class="logo-pc"> PC PARTS</span>
      </a>
      <nav class="header__nav">
        <a href="../../index.html">Inicio</a>
        <a href="catalogo.html" class="active">Productos</a>
        <a href="servicios.html">Servicios</a>
        <a href="pcbuilder.html">PC Builder</a>
        <a href="contacto.html">Contacto</a>
      </nav>
      <div class="header__actions">
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Buscar productos..." />
          <button><i class="fa fa-search"></i></button>
        </div>
        <a href="cuenta.html" class="icon-btn"><i class="fa fa-user"></i></a>
        <a href="carrito.html" class="icon-btn cart-btn">
          <i class="fa fa-shopping-cart"></i>
          <span class="cart-badge">0</span>
        </a>
      </div>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
    <nav class="mobile-nav" id="mobileNav">
      <a href="../../index.html">Inicio</a>
      <a href="catalogo.html">Productos</a>
      <a href="servicios.html">Servicios</a>
      <a href="pcbuilder.html">PC Builder</a>
      <a href="contacto.html">Contacto</a>
    </nav>
  </header>

  <main>
    <div class="catalog-page container">
      <aside class="sidebar">
        <div class="sidebar__header">
          <h3><i class="fa fa-filter"></i> Filtros</h3>
          <button id="clearFilters" class="clear-btn">Limpiar</button>
        </div>
        <div class="filter-group">
          <h4>Categoría</h4>
          <div class="filter-options" id="catFilters"></div>
        </div>
        <div class="filter-group">
          <h4>Marca</h4>
          <div class="filter-options" id="brandFilters"></div>
        </div>
        <div class="filter-group">
          <h4>Precio</h4>
          <div class="price-range">
            <div class="price-inputs">
              <input type="number" id="priceMin" placeholder="Mín" min="0" />
              <span>—</span>
              <input type="number" id="priceMax" placeholder="Máx" min="0" />
            </div>
            <input type="range" id="priceSlider" min="0" max="500000" value="500000" step="5000" />
            <p class="price-label">Hasta: <strong id="priceSliderVal">$500.000</strong></p>
          </div>
